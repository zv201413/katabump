name: Katabump Auto Renew

on:
  schedule:
  # 每天 UTC 0点 (北京时间 8点) 运行
  - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Start Proxy (sing-box)
      env:
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        if [ -z "$PROXY_URL" ]; then
          echo "PROXY_URL not set, skipping sing-box setup."
          exit 0
        fi
        SINGBOX_VER="1.11.0"
        echo "Downloading sing-box v${SINGBOX_VER}..."
        wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
        tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
        mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
        chmod +x ./sing-box
        echo "Generating sing-box config from PROXY_URL..."
        python proxy_handler.py
        echo "Starting sing-box..."
        nohup ./sing-box run -c config.json > singbox.log 2>&1 &
        sleep 3
        echo "sing-box started. PROXY_URL will be passed to action_renew.js."

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        npm install
        npx playwright install-deps chrome

    - name: Run Renew Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        PROXY_URL: ${{ secrets.PROXY_URL }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
      run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

    - name: Upload Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots/
